services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile          # to be written when deploying
    ports:
      - "8080:8080"
    environment:
      EODHD_API_KEY: ${EODHD_API_KEY}
      PORTFOLIO_DB_PATH: /data/portfolio.db
    volumes:
      - portfolio-data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile          # to be written when deploying
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:8080

volumes:
  portfolio-data:
